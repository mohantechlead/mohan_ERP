{% load static %}
<!DOCTYPE html>
<html>

<head>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap.css">
    <style>
        .hidden { display: none; }
        p {
            margin-bottom: 10px;
            display: flex; flex-flow: row wrap; align-items: center;
        }
        textarea.form-control { height: 35px; }
        label { color: black; }
    </style>
</head>

<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>Mohan PLC</h3>
            </div>
            <ul class="list-unstyled components">
                <br>
                <li style="font-size:larger; font-weight: 500;">
                    <a href="#wipMainSubmenu" data-toggle="collapse" aria-expanded="true" class="dropdown-toggle">WIP</a>
                    <ul class="collapse list-unstyled show" id="wipMainSubmenu">
                        <li class="{% if request.resolver_match and request.resolver_match.url_name == 'create_WIP' %}active{% endif %}" style="font-size: large;">
                            <a href="{% url 'create_WIP' %}">Create WIP</a>
                        </li>
                        <li class="{% if request.resolver_match and request.resolver_match.url_name == 'display_WIP' %}active{% endif %}" style="font-size: large;">
                            <a href="{% url 'display_WIP' %}">Display WIP</a>
                        </li>
                        <li class="{% if request.resolver_match and request.resolver_match.url_name == 'mrfwip_fgrn_flow_difference' %}active{% endif %}" style="font-size: large;">
                            <a href="{% url 'mrfwip_fgrn_flow_difference' %}">Variance</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid d-flex" style="font-size:larger; font-weight: 500;color: grey;word-spacing: 13px;">
                    <button type="button" id="sidebarCollapse" class="btn toggle">
                        <i class="fa fa-bars"></i>
                        <span style="color: white;"></span>
                    </button>
                    <a href="{% url 'create_grn' %}">GRN     |</a>
                    <a href="{% url 'create_MR' %}">MR     |</a>
                    <a href="{% url 'create_fgrn' %}">FGRN      |</a>
                    <a style=" font-size:30px; font-weight: 600; color: #2470dc;" href="{% url 'create_WIP' %}">WIP     |</a>
                    <a href="{% url 'input_delivery' %}">DN</a>
                    <div style="float: right;">
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-primary ms-2">Logout</button>
                        </form>
                    </div>
                </div>
            </nav>
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="{% static 'js/sidebar_collapse_active.js' %}"></script>
    <script type="text/javascript">
        $(document).ready(function () {
            $('#sidebarCollapse').on('click', function () {
                $('#sidebar').toggleClass('active');
            });
        });
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap.js"></script>
    {% block page_js %}{% endblock %}
</body>

</html>
