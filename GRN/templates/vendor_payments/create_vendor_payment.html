{% extends "grn_base.html" %}
{% block content %}
{% include "vendor_payments/_messages.html" %}

<div class="container" style="margin-top:16px;">
    <p>
        <a class="btn btn-default" href="{% url 'display_vendor_payments' %}">Display Vendor Payments</a>
    </p>
    <div class="panel panel-default">
        <div class="panel-heading"><h3 class="panel-title" style="font-weight:600;">Create Vendor Payment</h3></div>
        <div class="panel-body">
            <form method="post" id="vp-create-form" action="">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="payment_date">Payment date *</label>
                            <input type="date" class="form-control" name="payment_date" id="payment_date" required
                                   value="{% if post.payment_date %}{{ post.payment_date }}{% endif %}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="pr_no">Purchase (PR) *</label>
                            <select class="form-control" name="pr_no" id="pr_no" required>
                                <option value="">Select PR</option>
                                {% for o in purchase_options %}
                                <option value="{{ o.pr_no }}"
                                        data-vendor="{{ o.vendor_name|default:''|escape }}"
                                        data-remaining="{{ o.remaining }}"
                                        {% if post.pr_no == o.pr_no or prefill_pr == o.pr_no %}selected{% endif %}>{{ o.pr_no }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Supplier / vendor</label>
                            <input type="text" class="form-control" id="supplier_display" readonly style="background:#f5f5f5;">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="payment_type">Payment type *</label>
                            <select class="form-control" name="payment_type" id="payment_type" required>
                                <option value="partial" {% if post.payment_type == 'partial' or not post.payment_type %}selected{% endif %}>Partial</option>
                                <option value="full" {% if post.payment_type == 'full' %}selected{% endif %}>Full</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="amount">Amount *</label>
                            <input type="number" step="0.01" min="0" class="form-control" name="amount" id="amount"
                                   value="{% if post.amount %}{{ post.amount }}{% endif %}">
                            <p class="help-block" id="remaining_hint">Remaining: —</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="remark">Remark</label>
                            <textarea class="form-control" name="remark" id="remark" rows="3">{% if post.remark %}{{ post.remark }}{% endif %}</textarea>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>

<script>
(function () {
    var sel = document.getElementById('pr_no');
    var amount = document.getElementById('amount');
    var ptype = document.getElementById('payment_type');
    var sup = document.getElementById('supplier_display');
    var hint = document.getElementById('remaining_hint');

    function remainingFromOpt(opt) {
        if (!opt || !opt.value) return null;
        var r = parseFloat(opt.getAttribute('data-remaining'));
        return isNaN(r) ? 0 : r;
    }

    function sync() {
        var opt = sel.options[sel.selectedIndex];
        var rem = remainingFromOpt(opt);
        if (opt && opt.value) {
            sup.value = opt.getAttribute('data-vendor') || '';
            hint.textContent = 'Remaining: ' + (rem != null ? rem.toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—');
        } else {
            sup.value = '';
            hint.textContent = 'Remaining: —';
        }
        if (ptype.value === 'full' && rem != null && rem >= 0) {
            amount.value = rem.toFixed(2);
            amount.setAttribute('readonly', 'readonly');
        } else {
            amount.removeAttribute('readonly');
        }
    }

    sel.addEventListener('change', sync);
    ptype.addEventListener('change', sync);
    sync();
})();
</script>
{% endblock %}
