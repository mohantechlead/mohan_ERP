{% extends base_template %}
{% block content %}
<div class="container" style="max-width: 760px;">
  <h2>{{ title }}</h2>
  <form method="post" class="form-horizontal line-portal-form">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label class="col-sm-3 control-label text-left" for="{{ field.id_for_label }}">{{ field.label }}</label>
        <div class="col-sm-9">{{ field }}{% if field.errors %}<span class="text-danger">{{ field.errors }}</span>{% endif %}</div>
      </div>
    {% endfor %}
    <div class="form-group">
      <div class="col-sm-offset-3 col-sm-9">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-default" href="{% url cancel_url_name %}">Cancel</a>
      </div>
    </div>
  </form>
</div>
<style>
  .line-portal-form .control-label { text-align: left; }
</style>
{% endblock %}
